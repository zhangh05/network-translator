<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>网络配置翻译助手</title>
<style>
  :root {
    --bg: #f8f9fb; --s1: #fff; --s2: #f1f3f6;
    --t1: #1a1d26; --t2: #6b7280; --t3: #9ca3af; --br: #e5e7eb;
    --ac: #6366f1; --gr: #059669; --am: #d97706; --rd: #dc2626;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--t1);font:14px/1.6 "PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::selection{background:rgba(99,102,241,.15)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
  button{cursor:pointer;font:inherit;white-space:nowrap;transition:all .15s}
  select,input,textarea{font:inherit;outline:none;border:0}
  body{display:flex}

  /* ── sidebar ── */
  #sb{
    width:200px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--br);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #sb .sh{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 12px;height:48px;border-bottom:1px solid var(--br);
    font-size:13px;font-weight:700;color:var(--t1);flex-shrink:0;
  }
  #sb .sh button{background:var(--ac);color:#fff;border:0;width:26px;height:26px;border-radius:6px;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
  #sb .sh button:hover{background:#4f46e5}
  #sb .list{flex:1;overflow:auto;padding:6px}
  #sb .item{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
    cursor:pointer;font-size:13px;color:var(--t2);margin-bottom:2px;transition:all .12s;
  }
  #sb .item:hover{background:var(--s2);color:var(--t1)}
  #sb .item.active{background:var(--s2);color:var(--t1);font-weight:600}
  #sb .item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--t3)}
  #sb .item .dot.has{background:var(--ac)}
  #sb .item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #sb .item .rename{opacity:0;background:transparent;border:0;color:var(--t3);font-size:12px;padding:0 2px;cursor:pointer;line-height:1;flex-shrink:0}
  #sb .item .del{opacity:0;background:transparent;border:0;color:var(--t3);font-size:14px;padding:0 2px;cursor:pointer;line-height:1;flex-shrink:0}
  #sb .item:hover .rename,#sb .item:hover .del{opacity:1}
  #sb .item .rename:hover{color:var(--ac)}
  #sb .item .del:hover{color:var(--rd)}
  #sb .item .rename-input{flex:1;min-width:0;height:24px;padding:0 6px;border-radius:5px;background:#fff;color:var(--t1);border:1px solid var(--ac);font-size:13px}
  #sb .foot{padding:8px 12px;border-top:1px solid var(--br);flex-shrink:0}
  #sb .foot .stat{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
  #sb .foot .stat .sdot{width:6px;height:6px;border-radius:50%;background:var(--t3)}
  #sb .foot .stat .sdot.on{background:var(--gr)}

  /* ── main ── */
  #mn{flex:1;display:flex;flex-direction:column;overflow:hidden}

  #top{
    display:flex;align-items:center;gap:10px;
    padding:0 16px;height:48px;background:var(--s1);border-bottom:1px solid var(--br);flex-shrink:0;
  }
  #top .lbl{font-size:11px;color:var(--t3);font-weight:500;white-space:nowrap}
  #top .grp{display:flex;align-items:center;gap:5px}
  #top .grp select{width:auto;min-width:70px}
  #top .grp select.s{width:64px}
  #top .grp select.m{width:86px}
  #top .spc{flex:1}
  #top .src{color:var(--ac);font-size:11px}
  #top .dst{color:var(--am);font-size:11px}

  select{
    height:34px;padding:0 28px 0 12px;
    background:var(--s2);color:var(--t1);font-size:13px;border-radius:8px;
    cursor:pointer;appearance:none;
    background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%239ca3af' stroke-width='1.3' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 10px center;
  }
  select:hover{background:var(--br)}

  .arr{color:var(--t3);font-size:14px}

  .btn{
    display:inline-flex;align-items:center;gap:4px;
    height:34px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:500;
  }
  .btn--pri{background:var(--ac);color:#fff;font-weight:600}
  .btn--pri:hover{background:#4f46e5}
  .btn--pri:disabled{opacity:.8;animation:pulse 1.5s ease infinite}
  .btn--nor{background:var(--s2);color:var(--t2)}
  .btn--nor:hover{background:var(--br);color:var(--t1)}
  .btn--gho{background:transparent;color:var(--t3);padding:0 8px;font-size:18px}
  .btn--gho:hover{color:var(--t1)}
  @keyframes pulse{0%,100%{opacity:.8}50%{opacity:.45}}

  #body{flex:1;overflow:auto;padding:16px 20px 24px;display:flex;flex-direction:column;gap:16px}

  .card{background:var(--s1);border-radius:12px;border:1px solid var(--br);overflow:hidden}
  #rcard{overflow:visible}
  .card__head{display:flex;align-items:center;padding:0 20px;height:40px;border-bottom:1px solid var(--s2)}
  .card__head .tit{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.5px}
  .card__head .meta{font-size:12px;color:var(--t3);margin-left:auto}

  #source{display:block;width:100%;min-height:280px;max-height:520px;height:clamp(260px,32vh,520px);padding:18px 20px;resize:vertical;color:var(--t1);font:13px/1.7 "JetBrains Mono","Cascadia Code",ui-monospace,monospace;white-space:pre-wrap;overflow:auto;tab-size:2}
  #source::placeholder{color:#d1d5db}

  .rmeta{display:flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-bottom:1px solid var(--s2)}
  .rmeta .flex{flex:1}
  .rmeta .act{background:transparent;border:0;color:var(--t3);font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer}
  .rmeta .act:hover{background:var(--s2);color:var(--t1)}
  .rmeta .act:disabled{opacity:.3}

  .tag{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .tag::before{content:"";display:block;width:6px;height:6px;border-radius:50%}
  .tag--ok{background:rgba(5,150,105,.08);color:var(--gr)}.tag--ok::before{background:var(--gr)}
  .tag--warn{background:rgba(217,119,6,.08);color:var(--am)}.tag--warn::before{background:var(--am)}
  .tag--fail{background:rgba(220,38,38,.08);color:var(--rd)}.tag--fail::before{background:var(--rd)}
  .tag--dim{background:var(--s2);color:var(--t3)}.tag--dim::before{background:var(--t3)}

  .tabs{display:flex;padding:0 10px;height:36px;align-items:center;border-bottom:1px solid var(--s2);gap:2px}
  .tabs button{padding:5px 14px;border:0;border-radius:7px;background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer}
  .tabs button:hover{background:var(--s2);color:var(--t1)}
  .tabs button.on{background:var(--s2);color:var(--t1);font-weight:600}

  #out{min-height:160px;max-height:400px;padding:18px 20px;color:var(--t1);font:13px/1.7 "JetBrains Mono","Cascadia Code",ui-monospace,monospace;white-space:pre-wrap;overflow:auto;tab-size:2}
  #out .mr{background:#fef9c3;border-left:3px solid var(--am);padding-left:12px;display:block}

  #bar{display:flex;align-items:center;gap:12px;padding:0 20px 14px;font-size:12px;color:var(--t3)}
  #bar .flex{flex:1}
  #bwarn{color:var(--am)}
  #bwarn.h{display:none}

  /* ── copy dropdown ── */
  .cp-wrap{position:relative;display:inline-block}
  .cp-wrap .cp-btn{background:var(--ac);color:#fff;border:0;height:30px;padding:0 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
  .cp-wrap .cp-btn:hover{background:#4f46e5}
  .cp-wrap .cp-btn:disabled{opacity:.4;cursor:default}
  .cp-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;min-width:220px;background:var(--s1);border:1px solid var(--br);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:1000;overflow:hidden}
  .cp-menu.on{display:block}
  .cp-menu .cpi{padding:9px 14px;font-size:12px;color:var(--t1);cursor:pointer;display:flex;align-items:center;gap:8px;border:0;background:transparent;width:100%;text-align:left}
  .cp-menu .cpi:hover{background:var(--s2)}
  .cp-menu .cpi .desc{font-size:10px;color:var(--t3);display:block}

  /* overlay */
  #ovl{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.2);backdrop-filter:blur(2px)}
  #ovl.on{display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
  @keyframes fadeIn{from{opacity:0}}
  #cfg{width:380px;max-height:85vh;background:var(--s1);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.1);animation:up .2s}
  @keyframes up{from{opacity:0;transform:translateY(12px)}}
  #cfg .ch{display:flex;justify-content:space-between;align-items:center;padding:0 18px;height:48px;border-bottom:1px solid var(--s2);font-size:14px;font-weight:600}
  #cfg .cb{padding:18px}
  #cfg .row{margin-bottom:14px}
  #cfg .label{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}
  #cfg input{width:100%;height:36px;padding:0 12px;border-radius:8px;background:var(--s2);color:var(--t1);font-size:13px}
  #cfg input:focus{outline:2px solid var(--ac);outline-offset:-1px}
  #cfg .acts{display:flex;gap:8px;margin-top:4px}
  #cfg .acts button{height:34px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:500}
  #cfg .btn-s{background:var(--ac);color:#fff;font-weight:600}#cfg .btn-s:hover{background:#4f46e5}
  #cfg .btn-t{background:var(--s2);color:var(--t2)}#cfg .btn-t:hover{background:var(--br);color:var(--t1)}
  #cfg .msg{font-size:11px;color:var(--t2);margin-top:8px;min-height:16px}

  /* banner */
  .bn{display:none;margin-bottom:0;padding:0 16px;height:0;border-radius:8px;font-size:12px;font-weight:600;align-items:center;gap:8px;transition:all .25s;overflow:hidden}
  .bn.on{display:flex;margin-bottom:12px;height:36px;padding:0 16px}
  .bn--ok{background:rgba(5,150,105,.1);color:var(--gr)}
  .bn--fail{background:rgba(220,38,38,.08);color:var(--rd)}
  .bn--warn{background:rgba(217,119,6,.1);color:var(--am)}

  /* ── risk summary bar ── */
  #rsum{display:flex;align-items:center;gap:12px;padding:4px 16px 6px;font-size:12px;border-bottom:1px solid var(--s2)}
  #rsum.h{display:none}
  #rsum .rsb{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600}
  #rsum .rsb::before{content:"";display:block;width:6px;height:6px;border-radius:50%}
  #rsum .rsb--ok{background:rgba(5,150,105,.08);color:var(--gr)}.rsb--ok::before{background:var(--gr)}
  #rsum .rsb--warn{background:rgba(217,119,6,.08);color:var(--am)}.rsb--warn::before{background:var(--am)}
  #rsum .rsb--fail{background:rgba(220,38,38,.08);color:var(--rd)}.rsb--fail::before{background:var(--rd)}
  #rsum .rsc{color:var(--t3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  #rsum .rsc .s{color:var(--t1);font-weight:500}

  /* ── request_id row ── */
  #ridr{display:flex;align-items:center;gap:8px;padding:2px 20px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--s2);min-height:22px}
  #ridr.h{display:none}
  #ridr .rid{font-family:monospace;color:var(--t1)}
  #ridr .rcp{background:transparent;border:0;color:var(--ac);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
  #ridr .rcp:hover{background:var(--s2)}
  #ridr .vr{color:var(--t3);margin-left:auto}

  /* ── risk detail ── */
  .rd{padding:0 20px 20px}
  .rd h4{font-size:12px;font-weight:600;color:var(--t3);margin:16px 0 6px;letter-spacing:.4px}
  .rd h4:first-child{margin-top:14px}
  .rd table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
  .rd td,.rd th{padding:6px 8px;border-bottom:1px solid var(--s2);vertical-align:top;text-align:left}
  .rd th{color:var(--t3);font-weight:500;white-space:nowrap}
  .rd .sev{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .rd .sev--fatal{background:rgba(220,38,38,.08);color:var(--rd)}
  .rd .sev--warning{background:rgba(217,119,6,.08);color:var(--am)}
  .rd .sev--info{background:rgba(99,102,241,.08);color:var(--ac)}
  .rd .sev--none{background:var(--s2);color:var(--t3)}
  .rd .gap-feat{font-weight:600}
  .rd .gap-status{color:var(--t2);font-style:italic}
  .rd .gap-lines{display:block;color:var(--t3);font-size:11px;font-family:monospace;margin-top:2px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rd .err-item,.rd .warn-item{padding:4px 8px;border-radius:4px;margin-bottom:2px;font-size:12px}
  .rd .err-item{background:rgba(220,38,38,.06);color:var(--rd)}
  .rd .warn-item{background:rgba(217,119,6,.06);color:var(--am)}
  .rd .empty{color:var(--t3);font-size:12px;padding:8px 0}
  .rd .acc{font-size:11px;color:var(--t3);display:block;margin-top:2px}

  /* Risk tab — user-friendly grouped view */
  .risk-root{padding:0 20px 20px}
  .rs{margin-bottom:14px;border-radius:6px;overflow:hidden;font-size:12px}
  .rs__hd{padding:6px 12px;font-weight:600;font-size:11px;letter-spacing:.3px}
  .rs__note{font-weight:400;font-style:italic;opacity:.8}
  .rs__bd{padding:4px 8px}
  .risk-intro{margin:14px 0 12px;padding:12px;border-radius:8px;background:var(--s1);border-left:3px solid var(--ac)}
  .risk-intro__hd{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
  .risk-intro__bd{font-size:12px;color:var(--t2);line-height:1.6}
  .risk--fatal .rs__hd{background:rgba(220,38,38,.12);color:var(--rd)}
  .risk--fatal .rs__bd{background:rgba(220,38,38,.04)}
  .risk--review .rs__hd{background:rgba(217,119,6,.12);color:var(--am)}
  .risk--review .rs__bd{background:rgba(217,119,6,.04)}
  .risk--info .rs__hd{background:rgba(99,102,241,.08);color:var(--ac)}
  .risk--info .rs__bd{background:rgba(99,102,241,.04)}
  .ri{margin-bottom:4px;padding:4px 8px;border-radius:4px;background:var(--s2)}
  .ri__msg{color:var(--t1)}
  .ri__feat{font-size:11px;color:var(--t3);margin-left:6px;font-weight:400}

  /* Validation tab */
  .val-root{padding:0 20px 20px;font-size:12px}
  .val-tbl{width:100%;border-collapse:collapse;margin-bottom:12px}
  .val-k{color:var(--t3);padding:6px 10px 6px 0;white-space:nowrap;font-weight:400;text-align:left}
  .val-v{padding:6px 0}
  .vl{font-weight:600}
  .vl--ok{color:var(--gr)}
  .vl--warn{color:var(--am)}
  .vl--err{color:var(--rd)}
  .val-sec{margin-top:8px;border-radius:6px;overflow:hidden}
  .val-sec__hd{padding:4px 10px;font-weight:600;font-size:11px}
  .val-list{padding:4px 0;margin:0;list-style:none}
  .val-list li{padding:3px 10px;font-size:12px}
  .val-list--err{background:rgba(220,38,38,.06)}.val-list--err li{color:var(--rd)}
  .val-list--warn{background:rgba(217,119,6,.06)}.val-list--warn li{color:var(--am)}
  .val-raw{margin-top:14px}
  .val-toggle{background:none;border:none;color:var(--ac);cursor:pointer;font-size:11px;text-decoration:underline;padding:0}
  .val-raw pre{background:var(--s1);padding:10px;border-radius:6px;font-size:11px;margin-top:6px;overflow:auto;max-height:300px}
  .empty{color:var(--t3);font-size:12px;padding:8px 0}

  /* Diff tab */
  .diff-root{padding:0 20px 20px;font-size:12px}
  .ds{margin-bottom:10px;border-radius:6px;overflow:hidden}
  .ds__hd{padding:5px 10px;font-weight:600;font-size:11px}
  .ds__cnt{font-weight:400;opacity:.8;margin-left:4px}
  .ds__pre{background:var(--s1);padding:8px 10px;margin:0;font-size:11px;overflow:auto;max-height:200px;white-space:pre-wrap;word-break:break-all}
  .diff-intro{margin:14px 0 12px;padding:12px;border-radius:8px;background:var(--s1);border-left:3px solid var(--gr)}
  .diff-intro__hd{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
  .diff-intro__bd{font-size:12px;color:var(--t2);line-height:1.6}
  .diff-list{background:var(--s1);padding:8px 10px;margin:0;list-style:none}
  .diff-list li{padding:5px 0;border-bottom:1px solid var(--s2);line-height:1.5}
  .diff-list li:last-child{border-bottom:0}
  .diff-raw{display:block;color:var(--t3);font-family:monospace;font-size:11px;margin-top:2px}
  .diff--normal .ds__hd{background:rgba(5,150,105,.1);color:var(--gr)}
  .diff--confirm .ds__hd{background:rgba(217,119,6,.1);color:var(--am)}
  .diff--risk .ds__hd{background:rgba(220,38,38,.1);color:var(--rd)}
  .review-intro{margin:14px 0 12px;padding:12px;border-radius:8px;background:rgba(217,119,6,.08);border-left:3px solid var(--am);font-size:12px;color:var(--t2);line-height:1.6}
  .review-summary{margin:0 0 12px;padding:10px 12px;border:1px solid var(--br);border-radius:8px;background:var(--s1);font-size:12px;color:var(--t2);display:flex;gap:14px;flex-wrap:wrap}
  .review-summary b{color:var(--t1)}
  .review-filter{margin:0 0 12px;display:flex;gap:8px;flex-wrap:wrap}
  .review-filter__btn{border:1px solid var(--br);background:var(--s1);color:var(--t2);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer}
  .review-filter__btn.on{border-color:var(--am);background:#fff7ed;color:var(--am);font-weight:700}
  .review-group{margin:14px 0;border:1px solid var(--br);border-radius:12px;background:var(--s1);overflow:hidden}
  .review-group__hd{padding:9px 12px;background:linear-gradient(90deg,rgba(217,119,6,.12),rgba(255,255,255,.65));font-size:13px;font-weight:800;color:var(--t1);display:flex;justify-content:space-between;align-items:center}
  .review-group__count{font-size:11px;font-weight:600;color:var(--am);background:#fff7ed;border-radius:999px;padding:2px 8px}
  .review-group__bd{padding:0 10px 10px}
  .review-item{margin:10px 0;border:1px solid var(--br);border-radius:10px;overflow:hidden;background:var(--s1)}
  .review-item__hd{padding:8px 12px;background:var(--s2);font-size:12px;font-weight:700;color:var(--t1);display:flex;gap:8px;align-items:center}
  .review-item__tag{font-size:11px;color:var(--am);font-weight:600}
  .review-priority{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;margin-left:auto}
  .review-priority--must{background:#fee2e2;color:var(--rd)}
  .review-priority--confirm{background:#fff7ed;color:var(--am)}
  .review-priority--info{background:#e0f2fe;color:#0369a1}
  .review-item__bd{padding:10px 12px;font-size:12px;color:var(--t2)}
  .review-row{margin:8px 0}
  .review-row b{display:block;color:var(--t1);margin-bottom:4px}
  .review-src{background:#fff7ed;border-left:3px solid var(--am);padding:8px 10px;margin:0;white-space:pre-wrap;overflow:auto;max-height:160px;font:12px/1.6 "JetBrains Mono","Cascadia Code",ui-monospace,monospace;color:var(--t1)}

  /* Sub-label in risk summary bar */
  #rsum .rssub{display:block;font-size:11px;font-weight:400;color:var(--t3);margin-top:2px;margin-bottom:4px}

  @media(min-width:1100px){
    #body{display:grid;grid-template-columns:minmax(360px,42%) minmax(0,1fr);grid-template-rows:auto minmax(0,1fr);align-items:start;overflow:hidden}
    #banner{grid-column:1/-1}
    #scard,#rcard{height:calc(100vh - 128px);min-height:0}

  }

  @media(max-width:720px){

</style>

<body>

<div id="mn">

<script>
var E=function(id){return document.getElementById(id)};
var S="hostname Core-Router\ninterface GigabitEthernet0/1\n switchport mode trunk\n switchport trunk allowed vlan 10,20,30\n spanning-tree portfast\n!\nrouter bgp 65001\n neighbor 10.0.0.2 remote-as 65002";
var DOMAIN_META=null;

function H(){var h={"Content-Type":"application/json"};var k=localStorage.getItem("api_secret")||"";if(k)h["X-API-Secret"]=k;return h}

// ── Domain meta loader + cascading dropdowns ──
async function loadDomainMeta(){
  try{
    var r=await fetch("/api/domain/meta",{headers:H()});
    var d=await r.json();
    if(!r.ok||!d.ok)throw new Error("meta failed");
    DOMAIN_META=d;
    cascadeDomains()
  }catch(_){}
}
function rebuildPlatformSelects(){
  if(!DOMAIN_META)return;
  var sp=E("sp"),tp=E("tp");
  var fv=E("fv").value, tv=E("tv").value;
  // populate platform options
  sp.innerHTML="<option value='auto'>平台 auto</option>";
  tp.innerHTML="<option value=''>平台 auto</option>";
  var plats=DOMAIN_META.platforms||{};
  var spPlatforms=plats[fv]||["unknown"];
  spPlatforms.forEach(function(p){if(p==="unknown")return;sp.innerHTML+="<option value='"+p+"'>"+P(p)+"</option>"});
  var tpPlatforms=plats[tv]||["unknown"];
  tpPlatforms.forEach(function(p){if(p==="unknown")return;tp.innerHTML+="<option value='"+p+"'>"+P(p)+"</option>"});
}
function rebuildDomainSelect(sel,vendor,isSource){
  if(!DOMAIN_META)return;
  var domainVendors=DOMAIN_META.domain_vendors||{};
  var old=sel.value;
  sel.innerHTML="<option value='"+(isSource?"auto":"")+"'>域 auto</option>";
  Object.keys(domainVendors).forEach(function(d){
    if(domainVendors[d].indexOf(vendor)!==-1||vendor==="auto")
      sel.innerHTML+="<option value='"+d+"'>"+D(d)+"</option>";
  });
  if(sel.querySelector("[value='"+old+"']"))sel.value=old;
}
function cascadeDomains(){
  if(!DOMAIN_META)return;
  rebuildDomainSelect(E("sd"),E("fv").value,true);
  rebuildDomainSelect(E("td"),E("tv").value,false);
  rebuildPlatformSelects()
}
function D(v){return{vendor:{cisco:"Cisco",huawei:"华为",h3c:"华三",ruijie:"锐捷",hillstone:"山石",topsec:"天融信",dbappsecurity:"安恒",dptech:"迪普"},routing:"路由",switching:"交换",firewall:"防火墙"}[v]||v}
function P(v){return{vrp:"VRP",usg:"USG",comware:"Comware",secpath:"SecPath",ios:"IOS","ios-xe":"IOS-XE","nx-os":"NX-OS",asa:"ASA",ftd:"FTD","rg-os":"RGOS",stoneos:"StoneOS","topsec-os":"TOS"}[v]||v}
E("fv").addEventListener("change",cascadeDomains);
E("tv").addEventListener("change",cascadeDomains);
E("sd").addEventListener("change",rebuildPlatformSelects);
E("td").addEventListener("change",rebuildPlatformSelects);

// ── Backend project persistence ──
var PROJS=[];
var ACTIVE="";
var R={result:null,tab:"translated",t0:0,request_id:"",version:"",model:""};

async function api(method,url,body){
  var opt={method:method,headers:H()};
  if(body!=null){opt.body=JSON.stringify(body)}
  var r=await fetch(url,opt);
  if(!r.ok)throw new Error(await r.text());
  return r.json()
}

async function loadProjects(){
  try{
    var d=await api("GET","/api/projects");
    PROJS=(d.projects||[]).map(function(p){return{id:p.id,name:p.name||"窗口",config:p.config_text||"",from:p.from_vendor||"auto",to:p.to_vendor||"huawei",sd:p.source_domain||"",sp:p.source_platform||"",td:p.target_domain||"",tp:p.target_platform||"",result:p.result||null,request_id:p.request_id||"",version:p.version||"",model:p.model||"",tab:"translated"}});
    return
  }catch(_){}
  // fallback: localStorage
  try{var d=localStorage.getItem("nt_projects_v2");PROJS=d?JSON.parse(d):[]}catch(_){PROJS=[]}
}

async function saveProject(p){
  try{await api("PUT","/api/projects/"+p.id,{
    name:p.name,config_text:p.config,from_vendor:p.from,to_vendor:p.to,
    source_domain:p.sd||"",source_platform:p.sp||"",
    target_domain:p.td||"",target_platform:p.tp||"",
    result:p.result,
    request_id:p.request_id||"",version:p.version||"",model:p.model||""
  })}catch(_){}
  // localStorage fallback
  try{localStorage.setItem("nt_projects_v2",JSON.stringify(PROJS))}catch(_){}
}

async function createProject(){
  var n=PROJS.length+1;
  try{
    var d=await api("POST","/api/projects",{name:"窗口"+n});
    var p={id:d.project.id,name:d.project.name,config:"",from:"auto",to:"huawei",sd:"",sp:"",td:"",tp:"",result:null,tab:"translated",request_id:"",version:"",model:""};
    PROJS.push(p);ACTIVE=p.id;
    try{localStorage.setItem("nt_active_v2",ACTIVE)}catch(_){}
    renderSidebar();loadActive()
  }catch(_){
    // fallback: local only
    var id="p"+Date.now();PROJS.push({id:id,name:"窗口"+n,config:"",from:"auto",to:"huawei",sd:"",sp:"",td:"",tp:"",result:null,tab:"translated"});ACTIVE=id;
    try{localStorage.setItem("nt_active_v2",ACTIVE);localStorage.setItem("nt_projects_v2",JSON.stringify(PROJS))}catch(_){}
    renderSidebar();loadActive()
  }
}

async function deleteProject(id){
  try{await api("DELETE","/api/projects/"+id)}catch(_){}
  PROJS=PROJS.filter(function(p){return p.id!==id});
  if(ACTIVE===id){ACTIVE=PROJS.length?PROJS[0].id:""}
  try{localStorage.setItem("nt_active_v2",ACTIVE);localStorage.setItem("nt_projects_v2",JSON.stringify(PROJS))}catch(_){}
  renderSidebar();loadActive()
}

async function initProjects(){
  await loadProjects();
  // restore active
  try{ACTIVE=localStorage.getItem("nt_active_v2")||""}catch(_){}
  if(!PROJS.length){
    try{
      var d=await api("POST","/api/projects",{name:"窗口1"});
      PROJS.push({id:d.project.id,name:"窗口1",config:S,from:"auto",to:"huawei",sd:"",sp:"",td:"",tp:"",result:null,tab:"translated"});
      ACTIVE=d.project.id;try{localStorage.setItem("nt_active_v2",ACTIVE)}catch(_){}
    }catch(_){
      PROJS.push({id:"p1",name:"窗口1",config:S,from:"auto",to:"huawei",sd:"",sp:"",td:"",tp:"",result:null,tab:"translated"});ACTIVE="p1"
    }
  }
  if(!PROJS.find(function(p){return p.id===ACTIVE})){ACTIVE=PROJS[0].id;try{localStorage.setItem("nt_active_v2",ACTIVE)}catch(_){}}
  renderSidebar();loadActive()
}

function loadActive(){
  var p=PROJS.find(function(x){return x.id===ACTIVE});
  if(!p)return;
  E("bm").textContent="就绪";
  E("source").value=p.config||p.config_text||"";E("cc").textContent=(p.config||p.config_text||"").length;
  E("fv").value=p.from||"auto";
  E("sd").value=p.sd||"auto";
  E("sp").value=p.sp||"auto";
  E("tv").value=p.to||"huawei";
  E("td").value=p.td||"";
  E("tp").value=p.tp||"";
  R.result=p.result||null;R.tab=p.tab||"translated";R.request_id=p.request_id||"";R.version=p.version||"";R.model=p.model||"";
  bannerClear();
  if(p.result){
    E("rtag").textContent=p.result.fallback_used?"规则兜底":"LLM";E("rtag").className="tag "+(p.result.fallback_used?"tag--warn":"tag--ok");
    var st=_statusFromResult(p.result);
    E("sptag").textContent=st.txt;E("sptag").className="tag "+st.cls;
    E("rm").textContent=E("fv").value+" \u2192 "+E("tv").value;
    bannerShow(p.result.success?"ok":"warn",p.result.success?"翻译完成":"翻译完成（有告警）");
    E("cbtn").disabled=false;E("ebtn").disabled=false;
    if(R.request_id){E("rid").textContent=R.request_id;E("ridr").classList.remove("h");E("rvr").textContent=_versionLabel(R.version,R.model)}
  }else{E("rtag").textContent="待命";E("rtag").className="tag tag--dim";E("sptag").textContent="-";E("sptag").className="tag tag--dim";E("rm").textContent="";E("cbtn").disabled=true;E("ebtn").disabled=true;E("banner").className="bn"}
  document.querySelectorAll(".tabs button").forEach(function(t){t.classList.toggle("on",t.dataset.tab===R.tab)});
  RN()
}
function saveActive(){
  var p=PROJS.find(function(x){return x.id===ACTIVE});if(!p)return;
  p.config=E("source").value;p.from=E("fv").value;p.to=E("tv").value;
  p.sd=E("sd").value;p.sp=E("sp").value;p.td=E("td").value;p.tp=E("tp").value;
  p.result=R.result;p.tab=R.tab;p.request_id=R.request_id;p.version=R.version;p.model=R.model;
  saveProject(p)
}
function renderSidebar(){
  var list=E("plist");
  list.innerHTML=PROJS.map(function(p){var name=esc(p.name||"窗口").replace(/"/g,"&quot;");return'<div class="item'+(p.id===ACTIVE?' active':'')+'" data-id="'+p.id+'"><span class="dot'+(p.result?' has':'')+'"></span><span class="name" data-rename="'+p.id+'" title="双击重命名">'+name+'</span><button class="rename" data-rename="'+p.id+'" title="重命名">✎</button><button class="del" data-del="'+p.id+'">&times;</button></div>'}).join("")
}

function startRenameProject(id){
  var p=PROJS.find(function(x){return x.id===id});if(!p)return;
  var item=E("plist").querySelector('[data-id="'+id+'"]');if(!item)return;
  var current=p.name||"窗口";
  item.innerHTML='<span class="dot'+(p.result?' has':'')+'"></span><input class="rename-input" data-renaming="'+id+'" value="'+esc(current).replace(/"/g,"&quot;")+'" maxlength="60"><button class="del" data-del="'+id+'">&times;</button>';
  var input=item.querySelector(".rename-input");input.focus();input.select()
}

function commitRenameProject(id,value){
  var p=PROJS.find(function(x){return x.id===id});if(!p)return;
  var name=(value||"").trim();
  if(!name)name=p.name||"窗口";
  if(name.length>60)name=name.slice(0,60);
  p.name=name;
  saveProject(p);
  renderSidebar()
}

function cancelRenameProject(){renderSidebar()}

// ── Init ──
initProjects();

E("plist").addEventListener("click",function(e){
  var del=e.target.closest("[data-del]");if(del){e.stopPropagation();var id=del.dataset.del;if(PROJS.length<=1)return;deleteProject(id);return}
  var nameRen=e.target.closest(".name[data-rename]");if(nameRen&&e.detail>=2){e.stopPropagation();startRenameProject(nameRen.dataset.rename);return}
  var ren=e.target.closest("button.rename[data-rename]");if(ren){e.stopPropagation();startRenameProject(ren.dataset.rename);return}
  var item=e.target.closest("[data-id]");if(!item)return;saveActive();ACTIVE=item.dataset.id;try{localStorage.setItem("nt_active_v2",ACTIVE)}catch(_){};loadActive();renderSidebar()
});
E("plist").addEventListener("mousedown",function(e){
  var ren=e.target.closest(".name[data-rename]");
  if(ren&&e.detail>=2){e.preventDefault();e.stopPropagation();startRenameProject(ren.dataset.rename)}
},true);
E("plist").addEventListener("dblclick",function(e){
  var ren=e.target.closest("[data-rename]");if(ren){e.stopPropagation();startRenameProject(ren.dataset.rename)}
});
E("plist").addEventListener("keydown",function(e){
  var input=e.target.closest("[data-renaming]");if(!input)return;
  if(e.key==="Enter"){e.preventDefault();commitRenameProject(input.dataset.renaming,input.value)}
  if(e.key==="Escape"){e.preventDefault();cancelRenameProject()}
});
E("plist").addEventListener("focusout",function(e){
  var input=e.target.closest("[data-renaming]");if(!input)return;
  setTimeout(function(){if(!E("plist").contains(document.activeElement))commitRenameProject(input.dataset.renaming,input.value)},0)
});
E("addproj").addEventListener("click",function(){saveActive();createProject()});
E("sbtn").addEventListener("click",function(){E("source").value=S;E("cc").textContent=S.length;saveActive()});

function _renderValidationTab(v){
  if(!v||typeof v!=="object")return"<pre>"+esc(JSON.stringify(v,null,2))+"</pre>";
  var errs=v.errors||[];
  var warns=v.warnings||[];
  var mrr=v.manual_review_required;
  var dep=v.deployable;
  var lv=v.level||"info";

  var statusCls,statusTxt;
  if(dep===false||lv==="fatal"||errs.length>0){statusCls="err";statusTxt="不建议上线"}else if(mrr){statusCls="warn";statusTxt="需人工复核"}else{statusCls="ok";statusTxt="可部署"}
  var rows=[
    ["部署状态",'<span class="vl vl--'+statusCls+'">'+statusTxt+"</span>"],
    ["需人工复核",mrr?"是":"否"],
    ["错误数",errs.length||"无"],
    ["警告数",warns.length||"无"],
    ["残留检查",v.residue===false?"无残留":"有残留或未检查"],
    ["覆盖率",v.coverage!=null?v.coverage:"——"],
  ];
  var html='<div class="val-root">'+
    '<table class="val-tbl">'+
    rows.map(function(r){return'<tr><td class="val-k">'+esc(r[0])+'</td><td class="val-v">'+r[1]+"</td></tr>"}).join("")+
    "</table>";
  if(errs.length>0){
    html+='<div class="val-sec"><div class="val-sec__hd">错误详情</div><ul class="val-list val-list--err">'+
      errs.map(function(e){return"<li>"+esc(e)+"</li>"}).join("")+"</ul></div>";
  }
  if(warns.length>0){
    html+='<div class="val-sec"><div class="val-sec__hd">警告详情</div><ul class="val-list val-list--warn">'+
      warns.map(function(w){return"<li>"+esc(w)+"</li>"}).join("")+"</ul></div>";
  }
  html+='<details class="val-raw"><summary class="val-toggle">查看原始 JSON</summary><pre>'+esc(JSON.stringify(v,null,2))+"</pre></details>";
  html+="</div>";
  return html
}

function _renderDiffTab(diff){
  if(!diff||!diff.trim())return'<div class="empty">未发现差异</div>';
  var lines=diff.split("\n");
  var normal=[],confirm=[],unsupported=[];
  lines.forEach(function(l){
    var lo=l.toLowerCase();
    if(!l.trim())return;
    if(lo.indexOf("manual_review")!==-1||lo.indexOf("unsupported")!==-1){unsupported.push(l);return}
    if(lo.indexOf("port-channel")!==-1||lo.indexOf("vlan")!==-1||lo.indexOf("eth-trunk")!==-1||lo.indexOf("vlanif")!==-1||lo.indexOf("ethernet")!==-1){normal.push(l);return}
    if(lo.indexOf("+vlan")!==-1||lo.indexOf("-vlan")!==-1||lo.indexOf("+acl")!==-1||lo.indexOf("-acl")!==-1||lo.indexOf("+ospf")!==-1||lo.indexOf("-ospf")!==-1){confirm.push(l);return}
    if(lo.indexOf("duplicate")!==-1||lo.indexOf("conflict")!==-1||lo.indexOf("+ip route")!==-1||lo.indexOf("-ip route")!==-1){confirm.push(l);return}
    if(l.trim())normal.push(l);
  });
  function _diffLineToUserText(l){
    var raw=l.replace(/^[+\-]\s*/,"").trim();
    var lo=raw.toLowerCase();
    if(lo.indexOf("manual_review")!==-1||lo.indexOf("unsupported")!==-1)return"该命令没有确定的目标厂商等价写法，已进入人工复核。";
    if(lo.indexOf("vlanif")!==-1||lo.indexOf("vlan-interface")!==-1||lo.indexOf("interface vlan")!==-1)return"三层 VLAN 接口已按目标厂商命名方式转换。";
    if(lo.indexOf("eth-trunk")!==-1||lo.indexOf("bridge-aggregation")!==-1||lo.indexOf("port-channel")!==-1)return"链路聚合接口已按目标厂商命名方式转换。";
    if(lo.indexOf("vlan")!==-1)return"VLAN 配置已按目标厂商格式转换。";
    if(lo.indexOf("acl")!==-1||lo.indexOf("access-list")!==-1||lo.indexOf("traffic-filter")!==-1)return"ACL / 访问控制配置发生变化，需要确认规则顺序和绑定方向。";
    if(lo.indexOf("ospf")!==-1||lo.indexOf("bgp")!==-1||lo.indexOf("ip route")!==-1)return"路由相关配置发生变化，需要确认邻居、区域、下一跳和策略。";
    if(lo.indexOf("snmp")!==-1||lo.indexOf("aaa")!==-1||lo.indexOf("local-user")!==-1)return"管理面配置发生变化，需要按目标设备重新确认认证和审计策略。";
    return"配置格式或命令位置发生变化，请结合原配置确认语义一致。";
  }
  function _sec(title,cls,items){
    if(!items.length)return"";
    return'<div class="ds '+cls+'"><div class="ds__hd">'+title+' <span class="ds__cnt">'+items.length+'</span></div><ul class="diff-list">'+
      items.map(function(l){return"<li>"+esc(_diffLineToUserText(l))+"<span class='diff-raw'>"+esc(l)+"</span></li>"}).join("")+"</ul></div>";
  }
  return'<div class="diff-root">'+
    '<div class="diff-intro"><div class="diff-intro__hd">变更说明</div><div class="diff-intro__bd">这里先解释迁移中发生了什么，再把原始 diff 收起来。用户只需要优先确认“需要确认”和“未迁移”两类。</div></div>'+
    _sec("自动映射","diff--normal",normal)+
    _sec("需要确认的变化","diff--confirm",confirm)+
    _sec("未迁移 / 不支持","diff--risk",unsupported)+
    '<details class="val-raw"><summary class="val-toggle">查看原始 diff</summary><pre>'+esc(diff)+"</pre></details>"+
    "</div>";
}
function _extractManualReviewCommands(r){
  var text=[r&&r.translated||"",r&&r.deployable_config||""].join("\n");
  var out=[];
  text.split("\n").forEach(function(line){
    if(line.indexOf("MANUAL_REVIEW")===-1)return;
    var raw=line.replace(/^[!#]\s*/,"").trim();
    var m=raw.match(/unsupported source command:\s*(.+)$/i);
    if(m&&m[1]){out.push(m[1].trim());return}
    m=raw.match(/MANUAL_REVIEW[:\s]+(.+)$/i);
    if(m&&m[1])out.push(m[1].trim())
  });
  return out
}
function _reviewReasonForFeature(feature,fallback){

function _reviewPriorityForItem(it){
  var raw=((it&&it.priority)||(it&&it.severity)||(it&&it.risk_level)||(it&&it.status)||"").toLowerCase();
  var txt=[raw,(it&&it.reason)||"",((it&&it.feature)||"").toLowerCase()].join(" ");
  if(raw==="must"||raw==="critical"||raw==="fatal"||raw==="high"||txt.indexOf("unsupported")!==-1||txt.indexOf("未迁移")!==-1||txt.indexOf("不支持")!==-1){
    return{rank:0,key:"must",label:"必须处理"}
  }
  if(raw==="info"||raw==="low"||raw==="notice"){
    return{rank:2,key:"info",label:"信息提示"}
  }
  return{rank:1,key:"confirm",label:"需要确认"}
}
function _sortManualReviewItems(items){
  return (items||[]).slice().sort(function(a,b){
    var pa=_reviewPriorityForItem(a),pb=_reviewPriorityForItem(b);
    if(pa.rank!==pb.rank)return pa.rank-pb.rank;
    return String(a.group||"").localeCompare(String(b.group||""),"zh-CN")||String(a.feature||"").localeCompare(String(b.feature||""),"zh-CN")
  })
}
function _setReviewGroupFilter(btn,groupId){

  if(!root)return;
  root.querySelectorAll(".review-filter__btn").forEach(function(b){b.classList.toggle("on",b===btn)});
  root.querySelectorAll(".review-group").forEach(function(g){
    var show=!groupId||g.getAttribute("data-review-group-id")===groupId;
    g.style.display=show?"":"none";
  })

function _moduleGraphReviewItems(r){
  var graph=(r&&r.module_graph)||{};
  var modules=graph.modules||[];
  var out=[];
  modules.forEach(function(m){
    var lines=m.source_lines||[];
    var isManual=(m.status==="manual_review")||(m.manual_review_reason&&m.manual_review_reason.trim());
    if(!isManual)return;
    var meta=[];
    var relations=(m.couplings||[]).map(function(c){return _moduleCouplingLabel(c.relation||c.type||c.name)});
    if((m.provides||[]).length)meta.push("定义资源: "+m.provides.join(", "));
    if((m.consumes||[]).length)meta.push("引用资源: "+m.consumes.join(", "));
    if((m.depends_on||[]).length)meta.push("依赖模块: "+m.depends_on.join(", "));
    if(relations.length)meta.push("关联关系: "+relations.join(", "));
    if((m.tags||[]).length)meta.push("标签: "+m.tags.join(", "));
    out.push({
      feature:_friendlyFeatureName(m.feature),
      group:_reviewGroupForFeature(m.feature),
      reason:m.manual_review_reason||_reviewReasonForFeature(m.feature),
      lines:lines,
      action:_reviewActionForFeature(m.feature),
      meta:meta,
      severity:m.review_priority||m.risk_level||m.severity||m.status,
      span:"原配置第 "+m.start_line+"-"+m.end_line+" 行"
    })
  });
  return out
}
function _manualReviewItems(r){
  var items=[],seen={};
  function add(feature,reason,lines,action,meta,span,severity){
    lines=(lines||[]).filter(function(x){return x&&String(x).trim()}).slice(0,8);
    meta=(meta||[]).filter(function(x){return x&&String(x).trim()});
    var key=[feature||"未分类",reason||"",lines.join("\n"),meta.join("\n"),span||""].join("|");
    if(seen[key])return null;seen[key]=true;
    var item={feature:feature||"未分类",group:_reviewGroupForFeature(feature),reason:reason||_reviewReasonForFeature(feature),lines:lines,action:action||_reviewActionForFeature(feature),meta:meta,span:span||"",severity:severity||""};
    item.priority=_reviewPriorityForItem(item).key;
    items.push(item);
    return item
  }
  _moduleGraphReviewItems(r).forEach(function(m){
    var item=add(m.feature,m.reason,m.lines,m.action,m.meta,m.span,m.severity);
    if(item)item.group=m.group||item.group
  });
  (r.analyzer_results||[]).forEach(function(a){
    if(_isMissingAnalyzer(a))return;
    var lines=[];
    (a.source_lines||[]).forEach(function(x){lines.push(x)});
    (a.missing_context||[]).forEach(function(x){lines.push(x)});
    (a.rules||[]).slice(0,5).forEach(function(rule){(rule.source_lines||[]).forEach(function(x){lines.push(x)})});
    if(a.manual_review_required||lines.length||["warning","high","critical","fatal"].indexOf((a.risk_level||"").toLowerCase())!==-1){
      add(_friendlyFeatureName(a.feature),a.summary||(a.notes&&a.notes[0])||_reviewReasonForFeature(a.feature),lines,_reviewActionForFeature(a.feature),[], "", a.risk_level)
    }
  });
  _visibleCapabilityGaps(r.capability_gaps||[]).forEach(function(g){
    add(_friendlyFeatureName(g.feature),g.suggestion||_reviewReasonForFeature(g.feature),g.source_lines||[],_reviewActionForFeature(g.feature),[], "", g.severity||g.status)
  });
  (r.risk_signals||[]).forEach(function(s){
    add(_friendlyFeatureName(s.feature||"风险信号"),s.message||_reviewReasonForFeature(s.feature),s.source_lines||[],_reviewActionForFeature(s.feature),[], "", s.severity)
  });
  _extractManualReviewCommands(r).forEach(function(cmd){
    add("未迁移命令",_reviewReasonForFeature("unsupported",true),[cmd],"确认该命令是否需要在目标设备重建；如需要，请手工转换后再上线。",[], "", "high")
  });
  return items
}
function _manualReviewChecklistLines(r){
  var items=_sortManualReviewItems(_manualReviewItems(r));
  if(!items.length)return["无人工复核项"];
  var groups={},order=[];
  items.forEach(function(it){var g=it.group||"未支持能力";if(!groups[g]){groups[g]=[];order.push(g)}groups[g].push(it)});
  var lines=["人工复核清单：共 "+items.length+" 项，"+order.length+" 类"];
  order.forEach(function(g){
    lines.push("");
    lines.push("["+g+"] "+groups[g].length+" 项");
    groups[g].forEach(function(it,i){
      var pri=_reviewPriorityForItem(it);
      lines.push("  "+(i+1)+". ["+pri.label+"] "+it.feature+(it.span?" ("+it.span+")":""));
      lines.push("     原因: "+it.reason);
      if((it.meta||[]).length)lines.push("     关联: "+it.meta.join(" | "));
      if((it.lines||[]).length)lines.push("     原配置: "+it.lines.slice(0,3).join(" / "));
      lines.push("     建议: "+it.action);
    })
  });
  return lines
}
function _renderManualReviewTab(r){
  var items=_sortManualReviewItems(_manualReviewItems(r));

      '<div class="review-row"><b>建议动作</b>'+esc(it.action)+'</div>'+
      "</div></div>"}
  var filters="<div class=\"review-filter\"><button type=\"button\" class=\"review-filter__btn on\" data-review-group-id=\"\" onclick=\"_setReviewGroupFilter(this,'')\">全部</button>"+
    order.map(function(g){var id=groupIds[g];return"<button type=\"button\" class=\"review-filter__btn\" data-review-group-id=\""+id+"\" onclick=\"_setReviewGroupFilter(this,'"+id+"')\">"+esc(g)+" "+groups[g].length+"</button>"}).join("")+"</div>";
  return'<div class="review-root"><div class="review-intro"><b>人工复核</b><br>下面列出触发人工确认的原配置片段、原因和建议动作。翻译后配置不会自动包含这些不确定内容。</div>'+
    '<div class="review-summary"><span><b>复核总数</b> '+items.length+' 项</span><span><b>模块证据</b> '+_moduleGraphReviewItems(r).length+' 项</span><span><b>分组</b> '+order.length+' 类</span></div>'+
    filters+
    order.map(function(g){return'<section class="review-group" data-review-group-id="'+groupIds[g]+'"><div class="review-group__hd"><span>'+esc(g)+'</span><span class="review-group__count">'+groups[g].length+' 项</span></div><div class="review-group__bd">'+groups[g].map(card).join("")+'</div></section>'}).join("")+"</div>";
}

function _friendlyFeatureName(f){
  return {vlan:"VLAN",interface:"接口",ospf:"OSPF",static_route:"静态路由",acl:"ACL",stp:"STP",vrrp:"VRRP",system:"系统配置",ntp:"NTP",snmp:"SNMP",port_channel:"链路聚合",object_group:"对象组","object_group.member":"对象组成员",time_range:"时间段","firewall.profile":"安全配置文件",route_filter:"路由过滤器","qos.binding":"QoS 绑定",pbr:"PBR",multicast:"组播",bfd:"BFD",dhcp:"DHCP","access.auth_profile":"认证模板","access.dot1x":"802.1X","access.mac_auth":"MAC 认证","access.portal":"Portal 认证","access.radius_binding":"RADIUS / Domain 绑定","access.interface_binding":"接口准入绑定"}[f]||f||"配置项"

function _isSupportedGap(g){
  var status=(g.status||"").toLowerCase();
  var sev=(g.severity||"info").toLowerCase();
  return status==="supported"&&(sev==="info"||sev==="low"||!sev)
}
function _visibleCapabilityGaps(gaps){
  return (gaps||[]).filter(function(g){return !_isSupportedGap(g)})
}
function _isMissingAnalyzer(a){
  return (a.status==="skipped")&&((a.notes||[]).join(" ").indexOf("No analyzer registered")!==-1)
}
function _actionableAnalyzers(items){
  return (items||[]).filter(function(a){
    if(_isMissingAnalyzer(a))return false;
    var rl=(a.risk_level||"").toLowerCase();
    if(a.manual_review_required)return true;
    if(["critical","fatal","warning","high","medium"].indexOf(rl)!==-1)return true;
    return a.status==="analyzed"&&((a.rules||[]).length>0||(a.notes||[]).length>0)
  })
}
function _statusFromResult(r){
  var v=(r&&r.validation)||{};
  var errs=(v.errors||[]).length;
  var warns=(v.warnings||[]).length;
  var lv=v.level||"info";
  var dep=v.deployable;
  var hasFatal=(lv==="fatal"||errs>0||dep===false);
  var hasReview=!!(v.manual_review_required||warns>0||_visibleCapabilityGaps((r&&r.capability_gaps)||[]).length>0||_actionableAnalyzers((r&&r.analyzer_results)||[]).length>0||((r&&r.risk_signals)||[]).length>0);
  if(hasFatal)return {cls:"tag--fail",txt:"不建议上线"};
  if(hasReview)return {cls:"tag--warn",txt:"需人工复核"};

}

// ── Risk summary bar ──
function _updateRiskSummary(r){
  var sb=E("rsum"), ss=E("rsstatus"), sc=E("rscounts");
  if(!r){sb.classList.add("h");return}
  var v=r.validation||{};
  var dep=v.deployable, mrr=v.manual_review_required, lv=v.level||"info";
  var errs=(v.errors||[]).length;
  var warns=(v.warnings||[]).length;
  var visibleGaps=_visibleCapabilityGaps(r.capability_gaps||[]);
  var actionableAnalyzers=_actionableAnalyzers(r.analyzer_results||[]);
  var gaps=visibleGaps.length;
  var ar=actionableAnalyzers.length;
  var rs=(r.risk_signals||[]).length;
  var cls,label,sublabel;

  // Three-state logic:
  // 1. BLOCK: fatal error OR deployable=false with error OR high-risk residue
  // 2. REVIEW: manual_review_required OR warnings OR capability gaps
  // 3. OK: everything clean
  var hasFatal = (lv === "fatal" || errs > 0);
  var hasReview = mrr || warns > 0 || gaps > 0;
  var hasRiskSignal = rs > 0;
  var hasAnalyzer = ar > 0;

  if (hasFatal || dep === false) {
    cls = "fail";
    label = "不建议上线";
    sublabel = "存在错误或高风险，请修复后重新翻译";
  } else if (hasReview || hasRiskSignal || hasAnalyzer) {
    cls = "warn";
    label = "需人工复核";
    sublabel = "以下项目需要人工确认后再上线";
  } else {
    cls = "ok";
    label = "可部署";
    sublabel = "无错误或高风险，但人工复核仍建议执行";
  }

  ss.className = "rsb rsb--" + cls;
  ss.textContent = label;
  var subEl = ss.nextElementSibling;
  if (subEl && subEl.classList.contains("rssub")) {
    subEl.textContent = sublabel;
  }

  sc.innerHTML = [
    errs > 0 ? "错误 <span class='s'>" + errs + "</span>" : "",
    warns > 0 ? "警告 <span class='s'>" + warns + "</span>" : "",
    gaps > 0 ? "能力缺口 <span class='s'>" + gaps + "</span>" : "",
    ar > 0 ? "审计发现 <span class='s'>" + ar + "</span>" : "",
    rs > 0 ? "风险信号 <span class='s'>" + rs + "</span>" : "",
  ].filter(Boolean).join(" · ") || "无问题发现";
  sb.classList.remove("h")
}
function _renderRiskTabGrouped(r){
  var v=r.validation||{};
  var errors=v.errors||[], warnings=v.warnings||[];
  var gaps=_visibleCapabilityGaps(r.capability_gaps||[]);
  var ar=r.analyzer_results||[];
  var riskSignals=r.risk_signals||[];

  // ── Categorise items ──────────────────────────────────────────────
  var fatal=[], mustFix=[], review=[], info=[];
  var _sev=function(s){return s&&(s==="fatal"||s==="critical"?"fatal":s==="warning"||s==="high"?"warn":"info")};

  // Errors → mustFix or fatal
  errors.forEach(function(e){
    if(v.level==="fatal"){fatal.push(e);return}
    mustFix.push(e)});

  // Warnings → mustFix or review
  warnings.forEach(function(w){
    if(w.toLowerCase().indexOf("residue")!==-1||w.toLowerCase().indexOf("high risk")!==-1){mustFix.push(w);return}
    review.push(w)});

  // Capability gaps → review or info
  gaps.forEach(function(g){
    var sv=g.severity||"info";
    var msg=g.suggestion||(_friendlyFeatureName(g.feature)+" 在目标平台能力不完全一致，需确认替代实现");
    if(sv==="fatal"||sv==="critical"){fatal.push(msg);return}
    if(sv==="warning"||sv==="high"||sv==="medium"){review.push({msg:msg,feat:_friendlyFeatureName(g.feature)});return}
    info.push({msg:msg,feat:_friendlyFeatureName(g.feature)})});

  // Analyzer results
  var skippedAnalyzerFeatures=[];
  ar.forEach(function(a){
    if(_isMissingAnalyzer(a)){skippedAnalyzerFeatures.push(_friendlyFeatureName(a.feature));return}
    var rl=a.risk_level||"none";
    var msg=a.summary||(a.notes&&a.notes[0])||"-";
    if(msg==="-")msg=_friendlyFeatureName(a.feature)+" 已完成基础审计";
    if(rl==="critical"||rl==="fatal"){fatal.push(msg);return}
    if(rl==="warning"||rl==="high"){mustFix.push(msg);return}
    if(rl==="info"||rl==="low"){info.push({msg:msg,feat:_friendlyFeatureName(a.feature)});return}
    info.push({msg:msg,feat:_friendlyFeatureName(a.feature)})});
  if(skippedAnalyzerFeatures.length){
    info.push({msg:"以下功能暂未做深度审计，建议按变更单抽查："+skippedAnalyzerFeatures.join("、"),feat:"审计覆盖"})
  }

  // Risk signals
  riskSignals.forEach(function(s){
    var msg=s.message||"-";
    if(s.severity==="fatal"||s.severity==="critical"){fatal.push(msg);return}
    if(s.severity==="warning"||s.severity==="high"){review.push({msg:msg,feat:s.feature||"General"});return}
    review.push({msg:msg,feat:s.feature||"General"})});

  // ── Render helpers ──────────────────────────────────────────────────
  function _msgOf(it){return typeof it==="string"?it:(it&&it.msg)||""}
  function _dedupe(items,exclude){
    var seen={}, blocked={};
    (exclude||[]).forEach(function(it){blocked[_msgOf(it)]=true});
    return items.filter(function(it){var m=_msgOf(it);if(!m||blocked[m]||seen[m])return false;seen[m]=true;return true})
  }
  function _item(msg,feat){
    var f=esc(feat&&feat!=="General"?feat:"");
    var m=typeof msg==="string"?esc(msg):esc(msg.msg||"-");
    return'<div class="ri"><div class="ri__msg">'+m+(f?' <span class="ri__feat">'+f+"</span>":"")+"</div></div>";
  }
  function _section(title,cls,items,note){
    if(!items.length)return"";
    return'<div class="rs '+cls+'"><div class="rs__hd">'+title+
      (note?' <span class="rs__note">'+note+"</span>":"")+"</div>"+
      '<div class="rs__bd">'+
      items.map(function(it){return _item(typeof it==="string"?it:it.msg,it.feat||it.feature)}).join("")+
      "</div></div>";
  }
  function _renderRiskRawDetails(){
    var raw={validation:v,capability_gaps:gaps,analyzer_results:_actionableAnalyzers(ar),risk_signals:riskSignals};
    return'<details class="val-raw"><summary class="val-toggle">原始技术细节</summary><pre>'+esc(JSON.stringify(raw,null,2))+"</pre></details>";
  }

  var mustHandle=_dedupe(fatal.concat(mustFix));
  review=_dedupe(review,mustHandle);
  info=_dedupe(info,mustHandle.concat(review));
  var fallbackNotice="";
  if(r.fallback_used){
    fallbackNotice="<div class='rs risk--review'><div class='rs__hd'>⚠ 规则兜底 — 已启用</div><div class='rs__bd'><div class='ri'><div class='ri__msg'>LLM 已尝试翻译，但本次返回内容的结构化校验未通过，系统已自动切换到规则兜底。可执行配置只包含系统能确定的转换；其余内容已进入人工复核。请重点查看：人工复核摘要、可部署配置、风险报告。</div></div></div></div>"
  }
  var html='<div class="risk-root">'+
    '<div class="risk-intro"><div class="risk-intro__hd">上线检查清单</div><div class="risk-intro__bd"><b>上线结论：</b>'+esc((_statusFromResult(r)||{}).txt||"需人工复核")+'。先处理阻断项，再确认人工复核项；低风险自动处理项默认只作参考。</div></div>'+
    fallbackNotice+
    _section("上线前必须处理","risk--fatal",mustHandle)+
    _section("需要人工确认","risk--review",review)+
    _section("系统已自动处理","risk--info",info)+
    _renderRiskRawDetails()+
    "</div>";
  if(!mustHandle.length&&!review.length&&!info.length&&!r.fallback_used){
    html='<div class="risk-root"><div class="risk-intro"><div class="risk-intro__hd">上线检查清单</div><div class="risk-intro__bd"><b>上线结论：</b>可部署。未发现阻断项，建议仍按变更流程抽查。</div></div><div class="empty">无风险发现。</div>'+_renderRiskRawDetails()+"</div>";
  } else if(!mustHandle.length&&!review.length&&!info.length&&r.fallback_used){
    html='<div class="risk-root"><div class="risk-intro"><div class="risk-intro__hd">上线检查清单</div><div class="risk-intro__bd"><b>上线结论：</b>需人工复核。规则兜底结果只能作为辅助迁移。</div></div>'+fallbackNotice+"<div class='empty'>除规则兜底通知外，无其他风险发现。</div>"+_renderRiskRawDetails()+"</div>"
  }
  return html
}

async function _copyText(text){
  if(!text)return false;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true
    }
  }catch(_){}
  try{
    var ta=document.createElement("textarea");
    ta.value=text;ta.setAttribute("readonly","");
    ta.style.position="fixed";ta.style.left="-9999px";ta.style.top="0";
    document.body.appendChild(ta);ta.focus();ta.select();
    var ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok
  }catch(_){return false}
}
