<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>网络配置翻译助手</title>
<style>
  :root {
    --bg: #f8f9fb; --s1: #fff; --s2: #f1f3f6;
    --t1: #1a1d26; --t2: #6b7280; --t3: #9ca3af; --br: #e5e7eb;
    --ac: #6366f1; --gr: #059669; --am: #d97706; --rd: #dc2626;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--t1);font:14px/1.6 "PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::selection{background:rgba(99,102,241,.15)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
  button{cursor:pointer;font:inherit;white-space:nowrap;transition:all .15s}
  select,input,textarea{font:inherit;outline:none;border:0}
  body{display:flex}

  /* ── sidebar ── */
  #sb{
    width:200px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--br);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #sb .sh{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 12px;height:48px;border-bottom:1px solid var(--br);
    font-size:13px;font-weight:700;color:var(--t1);flex-shrink:0;
  }
  #sb .sh button{background:var(--ac);color:#fff;border:0;width:26px;height:26px;border-radius:6px;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
  #sb .sh button:hover{background:#4f46e5}
  #sb .list{flex:1;overflow:auto;padding:6px}
  #sb .item{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
    cursor:pointer;font-size:13px;color:var(--t2);margin-bottom:2px;transition:all .12s;
  }
  #sb .item:hover{background:var(--s2);color:var(--t1)}
  #sb .item.active{background:var(--s2);color:var(--t1);font-weight:600}
  #sb .item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--t3)}
  #sb .item .dot.has{background:var(--ac)}
  #sb .item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #sb .item .del{opacity:0;background:transparent;border:0;color:var(--t3);font-size:14px;padding:0 2px;cursor:pointer;line-height:1;flex-shrink:0}
  #sb .item:hover .del{opacity:1}
  #sb .item .del:hover{color:var(--rd)}
  #sb .foot{padding:8px 12px;border-top:1px solid var(--br);flex-shrink:0}
  #sb .foot .stat{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
  #sb .foot .stat .sdot{width:6px;height:6px;border-radius:50%;background:var(--t3)}
  #sb .foot .stat .sdot.on{background:var(--gr)}

  /* ── main ── */
  #mn{flex:1;display:flex;flex-direction:column;overflow:hidden}

  #top{
    display:flex;align-items:center;gap:10px;
    padding:0 16px;height:48px;background:var(--s1);border-bottom:1px solid var(--br);flex-shrink:0;
  }
  #top .lbl{font-size:11px;color:var(--t3);font-weight:500;white-space:nowrap}
  #top .grp{display:flex;align-items:center;gap:5px}
  #top .grp select{width:auto;min-width:70px}
  #top .grp select.s{width:64px}
  #top .grp select.m{width:86px}
  #top .spc{flex:1}
  #top .src{color:var(--ac);font-size:11px}
  #top .dst{color:var(--am);font-size:11px}

  select{
    height:34px;padding:0 28px 0 12px;
    background:var(--s2);color:var(--t1);font-size:13px;border-radius:8px;
    cursor:pointer;appearance:none;
    background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%239ca3af' stroke-width='1.3' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 10px center;
  }
  select:hover{background:var(--br)}

  .arr{color:var(--t3);font-size:14px}

  .btn{
    display:inline-flex;align-items:center;gap:4px;
    height:34px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:500;
  }
  .btn--pri{background:var(--ac);color:#fff;font-weight:600}
  .btn--pri:hover{background:#4f46e5}
  .btn--pri:disabled{opacity:.8;animation:pulse 1.5s ease infinite}
  .btn--nor{background:var(--s2);color:var(--t2)}
  .btn--nor:hover{background:var(--br);color:var(--t1)}
  .btn--gho{background:transparent;color:var(--t3);padding:0 8px;font-size:18px}
  .btn--gho:hover{color:var(--t1)}
  @keyframes pulse{0%,100%{opacity:.8}50%{opacity:.45}}

  #body{flex:1;overflow:auto;padding:16px 20px 24px;display:flex;flex-direction:column;gap:16px}

  .card{background:var(--s1);border-radius:12px;border:1px solid var(--br);overflow:hidden}
  .card__head{display:flex;align-items:center;padding:0 20px;height:40px;border-bottom:1px solid var(--s2)}
  .card__head .tit{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.5px}
  .card__head .meta{font-size:12px;color:var(--t3);margin-left:auto}

  #source{display:block;width:100%;min-height:240px;max-height:400px;padding:18px 20px;resize:vertical;color:var(--t1);font:13px/1.7 "JetBrains Mono","Cascadia Code",ui-monospace,monospace;white-space:pre-wrap;overflow:auto;tab-size:2}
  #source::placeholder{color:#d1d5db}

  .rmeta{display:flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-bottom:1px solid var(--s2)}
  .rmeta .flex{flex:1}
  .rmeta .act{background:transparent;border:0;color:var(--t3);font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer}
  .rmeta .act:hover{background:var(--s2);color:var(--t1)}
  .rmeta .act:disabled{opacity:.3}

  .tag{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .tag::before{content:"";display:block;width:6px;height:6px;border-radius:50%}
  .tag--ok{background:rgba(5,150,105,.08);color:var(--gr)}.tag--ok::before{background:var(--gr)}
  .tag--warn{background:rgba(217,119,6,.08);color:var(--am)}.tag--warn::before{background:var(--am)}
  .tag--fail{background:rgba(220,38,38,.08);color:var(--rd)}.tag--fail::before{background:var(--rd)}
  .tag--dim{background:var(--s2);color:var(--t3)}.tag--dim::before{background:var(--t3)}

  .tabs{display:flex;padding:0 10px;height:36px;align-items:center;border-bottom:1px solid var(--s2);gap:2px}
  .tabs button{padding:5px 14px;border:0;border-radius:7px;background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer}
  .tabs button:hover{background:var(--s2);color:var(--t1)}
  .tabs button.on{background:var(--s2);color:var(--t1);font-weight:600}

  #out{min-height:160px;max-height:400px;padding:18px 20px;color:var(--t1);font:13px/1.7 "JetBrains Mono","Cascadia Code",ui-monospace,monospace;white-space:pre-wrap;overflow:auto;tab-size:2}
  #out .mr{background:#fef9c3;border-left:3px solid var(--am);padding-left:12px;display:block}

  #bar{display:flex;align-items:center;gap:12px;padding:0 20px 14px;font-size:12px;color:var(--t3)}
  #bar .flex{flex:1}
  #bwarn{color:var(--am)}
  #bwarn.h{display:none}

  /* ── copy dropdown ── */
  .cp-wrap{position:relative;display:inline-block}
  .cp-wrap .cp-btn{background:var(--ac);color:#fff;border:0;height:30px;padding:0 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
  .cp-wrap .cp-btn:hover{background:#4f46e5}
  .cp-wrap .cp-btn:disabled{opacity:.4;cursor:default}
  .cp-menu{display:none;position:absolute;bottom:100%;left:0;margin-bottom:4px;min-width:200px;background:var(--s1);border:1px solid var(--br);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:100;overflow:hidden}
  .cp-menu.on{display:block}
  .cp-menu .cpi{padding:9px 14px;font-size:12px;color:var(--t1);cursor:pointer;display:flex;align-items:center;gap:8px;border:0;background:transparent;width:100%;text-align:left}
  .cp-menu .cpi:hover{background:var(--s2)}
  .cp-menu .cpi .desc{font-size:10px;color:var(--t3);display:block}

  /* overlay */
  #ovl{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.2);backdrop-filter:blur(2px)}
  #ovl.on{display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
  @keyframes fadeIn{from{opacity:0}}
  #cfg{width:380px;max-height:85vh;background:var(--s1);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.1);animation:up .2s}
  @keyframes up{from{opacity:0;transform:translateY(12px)}}
  #cfg .ch{display:flex;justify-content:space-between;align-items:center;padding:0 18px;height:48px;border-bottom:1px solid var(--s2);font-size:14px;font-weight:600}
  #cfg .cb{padding:18px}
  #cfg .row{margin-bottom:14px}
  #cfg .label{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}
  #cfg input{width:100%;height:36px;padding:0 12px;border-radius:8px;background:var(--s2);color:var(--t1);font-size:13px}
  #cfg input:focus{outline:2px solid var(--ac);outline-offset:-1px}
  #cfg .acts{display:flex;gap:8px;margin-top:4px}
  #cfg .acts button{height:34px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:500}
  #cfg .btn-s{background:var(--ac);color:#fff;font-weight:600}#cfg .btn-s:hover{background:#4f46e5}
  #cfg .btn-t{background:var(--s2);color:var(--t2)}#cfg .btn-t:hover{background:var(--br);color:var(--t1)}
  #cfg .msg{font-size:11px;color:var(--t2);margin-top:8px;min-height:16px}

  /* banner */
  .bn{display:none;margin-bottom:0;padding:0 16px;height:0;border-radius:8px;font-size:12px;font-weight:600;align-items:center;gap:8px;transition:all .25s;overflow:hidden}
  .bn.on{display:flex;margin-bottom:12px;height:36px;padding:0 16px}
  .bn--ok{background:rgba(5,150,105,.1);color:var(--gr)}
  .bn--fail{background:rgba(220,38,38,.08);color:var(--rd)}
  .bn--warn{background:rgba(217,119,6,.1);color:var(--am)}

  /* ── risk summary bar ── */
  #rsum{display:flex;align-items:center;gap:12px;padding:4px 16px 6px;font-size:12px;border-bottom:1px solid var(--s2)}
  #rsum.h{display:none}
  #rsum .rsb{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;border-radius:6px;font-size:11px;font-weight:600}
  #rsum .rsb::before{content:"";display:block;width:6px;height:6px;border-radius:50%}
  #rsum .rsb--ok{background:rgba(5,150,105,.08);color:var(--gr)}.rsb--ok::before{background:var(--gr)}
  #rsum .rsb--warn{background:rgba(217,119,6,.08);color:var(--am)}.rsb--warn::before{background:var(--am)}
  #rsum .rsb--fail{background:rgba(220,38,38,.08);color:var(--rd)}.rsb--fail::before{background:var(--rd)}
  #rsum .rsc{color:var(--t3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  #rsum .rsc .s{color:var(--t1);font-weight:500}

  /* ── request_id row ── */
  #ridr{display:flex;align-items:center;gap:8px;padding:2px 20px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--s2);min-height:22px}
  #ridr.h{display:none}
  #ridr .rid{font-family:monospace;color:var(--t1)}
  #ridr .rcp{background:transparent;border:0;color:var(--ac);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
  #ridr .rcp:hover{background:var(--s2)}
  #ridr .vr{color:var(--t3);margin-left:auto}

  /* ── risk detail ── */
  .rd{padding:0 20px 20px}
  .rd h4{font-size:12px;font-weight:600;color:var(--t3);margin:16px 0 6px;letter-spacing:.4px}
  .rd h4:first-child{margin-top:14px}
  .rd table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
  .rd td,.rd th{padding:6px 8px;border-bottom:1px solid var(--s2);vertical-align:top;text-align:left}
  .rd th{color:var(--t3);font-weight:500;white-space:nowrap}
  .rd .sev{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .rd .sev--fatal{background:rgba(220,38,38,.08);color:var(--rd)}
  .rd .sev--warning{background:rgba(217,119,6,.08);color:var(--am)}
  .rd .sev--info{background:rgba(99,102,241,.08);color:var(--ac)}
  .rd .sev--none{background:var(--s2);color:var(--t3)}
  .rd .gap-feat{font-weight:600}
  .rd .gap-status{color:var(--t2);font-style:italic}
  .rd .gap-lines{display:block;color:var(--t3);font-size:11px;font-family:monospace;margin-top:2px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rd .err-item,.rd .warn-item{padding:4px 8px;border-radius:4px;margin-bottom:2px;font-size:12px}
  .rd .err-item{background:rgba(220,38,38,.06);color:var(--rd)}
  .rd .warn-item{background:rgba(217,119,6,.06);color:var(--am)}
  .rd .empty{color:var(--t3);font-size:12px;padding:8px 0}
  .rd .acc{font-size:11px;color:var(--t3);display:block;margin-top:2px}

  /* Risk tab — user-friendly grouped view */
  .risk-root{padding:0 20px 20px}
  .rs{margin-bottom:14px;border-radius:6px;overflow:hidden;font-size:12px}
  .rs__hd{padding:6px 12px;font-weight:600;font-size:11px;letter-spacing:.3px}
  .rs__note{font-weight:400;font-style:italic;opacity:.8}
  .rs__bd{padding:4px 8px}
  .risk--fatal .rs__hd{background:rgba(220,38,38,.12);color:var(--rd)}
  .risk--fatal .rs__bd{background:rgba(220,38,38,.04)}
  .risk--review .rs__hd{background:rgba(217,119,6,.12);color:var(--am)}
  .risk--review .rs__bd{background:rgba(217,119,6,.04)}
  .risk--info .rs__hd{background:rgba(99,102,241,.08);color:var(--ac)}
  .risk--info .rs__bd{background:rgba(99,102,241,.04)}
  .ri{margin-bottom:4px;padding:4px 8px;border-radius:4px;background:var(--s2)}
  .ri__msg{color:var(--t1)}
  .ri__feat{font-size:11px;color:var(--t3);margin-left:6px;font-weight:400}

  /* Validation tab */
  .val-root{padding:0 20px 20px;font-size:12px}
  .val-tbl{width:100%;border-collapse:collapse;margin-bottom:12px}
  .val-k{color:var(--t3);padding:6px 10px 6px 0;white-space:nowrap;font-weight:400;text-align:left}
  .val-v{padding:6px 0}
  .vl{font-weight:600}
  .vl--ok{color:var(--gr)}
  .vl--warn{color:var(--am)}
  .vl--err{color:var(--rd)}
  .val-sec{margin-top:8px;border-radius:6px;overflow:hidden}
  .val-sec__hd{padding:4px 10px;font-weight:600;font-size:11px}
  .val-list{padding:4px 0;margin:0;list-style:none}
  .val-list li{padding:3px 10px;font-size:12px}
  .val-list--err{background:rgba(220,38,38,.06)}.val-list--err li{color:var(--rd)}
  .val-list--warn{background:rgba(217,119,6,.06)}.val-list--warn li{color:var(--am)}
  .val-raw{margin-top:14px}
  .val-toggle{background:none;border:none;color:var(--ac);cursor:pointer;font-size:11px;text-decoration:underline;padding:0}
  .val-raw pre{background:var(--s1);padding:10px;border-radius:6px;font-size:11px;margin-top:6px;overflow:auto;max-height:300px}
  .empty{color:var(--t3);font-size:12px;padding:8px 0}

  /* Diff tab */
  .diff-root{padding:0 20px 20px;font-size:12px}
  .ds{margin-bottom:10px;border-radius:6px;overflow:hidden}
  .ds__hd{padding:5px 10px;font-weight:600;font-size:11px}
  .ds__cnt{font-weight:400;opacity:.8;margin-left:4px}
  .ds__pre{background:var(--s1);padding:8px 10px;margin:0;font-size:11px;overflow:auto;max-height:200px;white-space:pre-wrap;word-break:break-all}
  .diff--normal .ds__hd{background:rgba(5,150,105,.1);color:var(--gr)}
  .diff--confirm .ds__hd{background:rgba(217,119,6,.1);color:var(--am)}
  .diff--risk .ds__hd{background:rgba(220,38,38,.1);color:var(--rd)}

  /* Sub-label in risk summary bar */
  #rsum .rssub{display:block;font-size:11px;font-weight:400;color:var(--t3);margin-top:2px;margin-bottom:4px}

  @media(max-width:720px){
    #sb{width:56px}
    #sb .item .name,#sb .item .del,#sb .sh span,#sb .foot .stat span{display:none}
    #sb .sh{justify-content:center}
  }
</style>
</head>
<body>

<div id="sb">
  <div class="sh"><span>翻译窗口</span><button id="addproj" title="新建窗口">+</button></div>
  <div class="list" id="plist"></div>
  <div class="foot"><span class="stat"><span class="sdot" id="sd1"></span><span id="sl">检测中</span></span></div>
</div>

<div id="mn">
  <div id="top">
    <span class="lbl src">源</span>
    <select id="fv">
      <option value="auto">自动检测</option>
      <option value="cisco">Cisco</option>
      <option value="huawei">华为</option>
      <option value="h3c">华三</option>
    </select>
    <select id="sd" class="s">
      <option value="auto">域 auto</option>
      <option value="routing">路由</option>
      <option value="switching">交换</option>
      <option value="firewall">防火墙</option>
    </select>
    <select id="sp" class="s">
      <option value="auto">平台 auto</option>
    </select>
    <span class="arr">&rarr;</span>
    <span class="lbl dst">目标</span>
    <select id="tv">
      <option value="huawei">华为</option>
      <option value="cisco">Cisco</option>
      <option value="h3c">华三</option>
    </select>
    <select id="td" class="s">
      <option value="">域 auto</option>
      <option value="routing">路由</option>
      <option value="switching">交换</option>
      <option value="firewall">防火墙</option>
    </select>
    <select id="tp" class="s">
      <option value="">平台 auto</option>
    </select>
    <button class="btn btn--pri" id="tbtn">翻译</button>
    <button class="btn btn--nor" id="sbtn">示例</button>
    <span class="spc"></span>
    <span style="font-size:12px;color:var(--t3)" id="bmd"></span>
    <button class="btn btn--gho" id="obtn">&hellip;</button>
  </div>

  <div id="body">
    <div id="banner" class="bn"></div>
    <div class="card">
      <div class="card__head"><span class="tit">原始配置</span><span class="meta" id="cc">0</span></div>
      <textarea id="source" spellcheck="false" placeholder="在此粘贴网络设备配置..."></textarea>
    </div>
    <div class="card" id="rcard">
      <div class="card__head"><span class="tit">翻译结果</span><span class="meta" id="rm"></span></div>
      <div class="rmeta">
        <span class="tag tag--dim" id="rtag">待命</span>
        <span class="tag tag--dim" id="sptag">-</span>
        <span class="flex"></span>
        <span id="pphase" style="font-size:11px;color:var(--t3)"></span>
        <span class="spc"></span>
        <div class="cp-wrap">
          <button class="cp-btn" id="cbtn" disabled>复制</button>
          <div class="cp-menu" id="cpmenu">
            <button class="cpi" data-cp="all"><span>复制全部配置</span><span class="desc">完整翻译配置</span></button>
            <button class="cpi" data-cp="deployable"><span>复制可部署配置</span><span class="desc">跳过 MANUAL_REVIEW 行</span></button>
            <button class="cpi" data-cp="report"><span>复制风险报告</span><span class="desc">request_id / 验证 / 分析器</span></button>
          </div>
        </div>
        <button class="act" id="ebtn" disabled>导出</button>
        <button class="act" id="xbtn">清空</button>
      </div>
      <div id="ridr" class="h">
        <span>Request ID:</span>
        <span class="rid" id="rid"></span>
        <button class="rcp" id="ridcp" title="复制 Request ID">复制</button>
        <span class="vr" id="rvr"></span>
      </div>
      <div id="rsum" class="h">
        <span class="rsb rsb--ok" id="rsstatus"></span>
        <span class="rssub"></span>
        <span class="rsc" id="rscounts"></span>
      </div>
      <div class="tabs">
        <button class="on" data-tab="translated">翻译后配置</button>
        <button data-tab="risk">风险分析</button>
        <button data-tab="validation">校验结果</button>
        <button data-tab="diff">差异对比</button>
        <button data-tab="trace">执行耗时</button>

function _renderValidationTab(v){
  if(!v||typeof v!=="object")return"<pre>"+esc(JSON.stringify(v,null,2))+"</pre>";
  var errs=v.errors||[];

  var mrr=v.manual_review_required;

  var statusCls,statusTxt;
  if(dep===false||lv==="fatal"||errs.length>0){statusCls="err";statusTxt="不建议上线"}else if(mrr){statusCls="warn";statusTxt="需人工复核"}else{statusCls="ok";statusTxt="可部署"}
  var rows=[
    ["部署状态",'<span class="vl vl--'+statusCls+'">'+statusTxt+"</span>"],
    ["需人工复核",mrr?"是":"否"],
    ["错误数",errs.length||"无"],
    ["警告数",warns.length||"无"],
    ["残留检查",v.residue===false?"无残留":"有残留或未检查"],
    ["覆盖率",v.coverage!=null?v.coverage:"——"],
  ];
  var html='<div class="val-root">'+
    '<table class="val-tbl">'+
    rows.map(function(r){return'<tr><td class="val-k">'+esc(r[0])+'</td><td class="val-v">'+r[1]+"</td></tr>"}).join("")+
    "</table>";
  if(errs.length>0){
    html+='<div class="val-sec"><div class="val-sec__hd">错误详情</div><ul class="val-list val-list--err">'+
      errs.map(function(e){return"<li>"+esc(e)+"</li>"}).join("")+"</ul></div>";
  }
  if(warns.length>0){
    html+='<div class="val-sec"><div class="val-sec__hd">警告详情</div><ul class="val-list val-list--warn">'+
      warns.map(function(w){return"<li>"+esc(w)+"</li>"}).join("")+"</ul></div>";
  }
  html+='<div class="val-raw"><button class="val-toggle" onclick="this.nextElementSibling.classList.toggle(\'h\');this.textContent=this.nextElementSibling.classList.contains(\' + "'h'" + ')?\'查看原始 JSON\':\'收起 JSON\'">查看原始 JSON</button><pre class="h">'+esc(JSON.stringify(v,null,2))+"</pre></div>";
  html+="</div>";
  return html
}

function _renderDiffTab(diff){
  if(!diff||!diff.trim())return'<div class="empty">未发现差异</div>';
  var lines=diff.split("\n");
  var normal=[],confirm=[],risk=[];
  lines.forEach(function(l){
    var lo=l.toLowerCase();
    if(lo.indexOf("port-channel")!==-1||lo.indexOf("vlan")!==-1||lo.indexOf("eth-trunk")!==-1||lo.indexOf("vlanif")!==-1||lo.indexOf("ethernet")!==-1){normal.push(l);return}
    if(lo.indexOf("+vlan")!==-1||lo.indexOf("-vlan")!==-1||lo.indexOf("+acl")!==-1||lo.indexOf("-acl")!==-1||lo.indexOf("+ospf")!==-1||lo.indexOf("-ospf")!==-1){confirm.push(l);return}
    if(lo.indexOf("duplicate")!==-1||lo.indexOf("conflict")!==-1||lo.indexOf("+ip route")!==-1||lo.indexOf("-ip route")!==-1){risk.push(l);return}
    if(l.trim())normal.push(l);
  });
  function _sec(title,cls,items){
    if(!items.length)return"";
    return'<div class="ds"><div class="ds__hd">'+title+' <span class="ds__cnt">'+items.length+'</span></div><pre class="ds__pre">'+
      items.map(function(l){return esc(l)}).join("\n")+"</pre></div>";
  }
  return'<div class="diff-root">'+
    _sec("正常厂商映射","diff--normal",normal)+
    _sec("需确认的变化","diff--confirm",confirm)+
    _sec("潜在风险","diff--risk",risk)+
    '<div class="val-raw"><button class="val-toggle" onclick="this.nextElementSibling.classList.toggle(\' + "'h'" + '\');this.textContent=this.nextElementSibling.classList.contains(\' + "'h'" + ')?\'查看原始 diff\':\'收起 diff\'">查看原始 diff</button><pre class="h">'+esc(diff)+"</pre></div>"+
    "</div>";
}

// ── Risk summary bar ──
function _updateRiskSummary(r){
  var sb=E("rsum"), ss=E("rsstatus"), sc=E("rscounts");
  if(!r){sb.classList.add("h");return}
  var v=r.validation||{};
  var dep=v.deployable, mrr=v.manual_review_required, lv=v.level||"info";
  var errs=(v.errors||[]).length;
  var warns=(v.warnings||[]).length;
  var gaps=(r.capability_gaps||[]).length;
  var ar=(r.analyzer_results||[]).length;
  var rs=(r.risk_signals||[]).length;
  var cls,label,sublabel;

  // Three-state logic:
  // 1. BLOCK: fatal error OR deployable=false with error OR high-risk residue
  // 2. REVIEW: manual_review_required OR warnings OR capability gaps
  // 3. OK: everything clean
  var hasFatal = (lv === "fatal" || errs > 0);
  var hasReview = mrr || warns > 0 || gaps > 0;
  var hasRiskSignal = rs > 0;
  var hasAnalyzer = ar > 0;

  if (hasFatal || dep === false) {
    cls = "fail";
    label = "不建议上线";
    sublabel = "存在错误或高风险，请修复后重新翻译";
  } else if (hasReview || hasRiskSignal || hasAnalyzer) {
    cls = "warn";
    label = "需人工复核";
    sublabel = "以下项目需要人工确认后再上线";
  } else {
    cls = "ok";
    label = "可部署";
    sublabel = "无错误或高风险，但人工复核仍建议执行";
  }

  ss.className = "rsb rsb--" + cls;
  ss.textContent = label;
  var subEl = ss.nextElementSibling;
  if (subEl && subEl.classList.contains("rssub")) {
    subEl.textContent = sublabel;
  }

  sc.innerHTML = [
    errs > 0 ? "错误 <span class='s'>" + errs + "</span>" : "",
    warns > 0 ? "警告 <span class='s'>" + warns + "</span>" : "",
    gaps > 0 ? "能力缺口 <span class='s'>" + gaps + "</span>" : "",
    ar > 0 ? "分析器发现 <span class='s'>" + ar + "</span>" : "",
    rs > 0 ? "风险信号 <span class='s'>" + rs + "</span>" : "",
  ].filter(Boolean).join(" · ") || "无问题发现";
  sb.classList.remove("h")
}
function _renderRiskTabGrouped(r){
  var v=r.validation||{};
  var errors=v.errors||[], warnings=v.warnings||[];
  var gaps=r.capability_gaps||[];
  var ar=r.analyzer_results||[];
  var riskSignals=r.risk_signals||[];

  // ── Categorise items ──────────────────────────────────────────────
  var fatal=[], mustFix=[], review=[], info=[];
  var _sev=function(s){return s&&(s==="fatal"||s==="critical"?"fatal":s==="warning"||s==="high"?"warn":"info")};

  // Errors → mustFix or fatal
  errors.forEach(function(e){
    if(v.level==="fatal"){fatal.push(e);return}
    mustFix.push(e)});

  // Warnings → mustFix or review
  warnings.forEach(function(w){
    if(w.toLowerCase().indexOf("residue")!==-1||w.toLowerCase().indexOf("high risk")!==-1){mustFix.push(w);return}
    review.push(w)});

  // Capability gaps → review or info
  gaps.forEach(function(g){
    var sv=g.severity||"info";
    if(sv==="fatal"||sv==="critical"){fatal.push(g.suggestion||g.feature+" 能力缺口");return}
    if(sv==="warning"||sv==="high"||sv==="medium"){review.push({msg:(g.suggestion||g.status||""),feat:g.feature});return}
    info.push({msg:(g.suggestion||g.status||""),feat:g.feature})});

  // Analyzer results
  ar.forEach(function(a){
    var rl=a.risk_level||"none";
    var msg=a.summary||(a.notes&&a.notes[0])||"-";
    if(rl==="critical"||rl==="fatal"){fatal.push(msg);return}
    if(rl==="warning"||rl==="high"){mustFix.push(msg);return}
    if(rl==="info"||rl==="low"){review.push({msg:msg,feat:a.feature});return}
    info.push({msg:msg,feat:a.feature})});

  // Risk signals
  riskSignals.forEach(function(s){
    var msg=s.message||"-";
    if(s.severity==="fatal"||s.severity==="critical"){fatal.push(msg);return}
    if(s.severity==="warning"||s.severity==="high"){mustFix.push(msg);return}
    review.push({msg:msg,feat:s.feature||"General"})});

  // ── Render helpers ──────────────────────────────────────────────────
  function _item(msg,feat){
    var f=esc(feat&&feat!=="General"?feat:"");
    var m=typeof msg==="string"?esc(msg):esc(msg.msg||"-");
    return'<div class="ri"><div class="ri__msg">'+m+(f?' <span class="ri__feat">'+f+"</span>":"")+"</div></div>";
  }
  function _section(title,cls,items,note){
    if(!items.length)return"";
    return'<div class="rs '+cls+'"><div class="rs__hd">'+title+
      (note?' <span class="rs__note">'+note+"</span>":"")+"</div>"+
      '<div class="rs__bd">'+
      items.map(function(it){return _item(typeof it==="string"?it:it.msg,it.feat||it.feature)}).join("")+
      "</div></div>";
  }

  var html='<div class="risk-root">'+
    _section("⬆ 必须处理 — 会阻断上线","risk--fatal",fatal)+
    _section("⚠ 建议复核 — 需要人工确认","risk--review",review)+
    _section("ℹ 信息提示","risk--info",info)+
    "</div>";
  if(!fatal.length&&!review.length&&!info.length){
    html='<div class="empty">无风险发现，翻译结果可直接用于人工复核。</div>';
  }
  return html
}
// ── Render output ──
function _highlightManualReview(text){
  if(!text)return text;
  return text.split("\n").map(function(l){
    if(l.indexOf("MANUAL_REVIEW")!==-1)return '<span class="mr">'+esc(l)+'</span>';
    return esc(l)
  }).join("\n")
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function RN(){
  var r=R.result;
  if(!r){E("out").textContent="";_updateRiskSummary(null);return}
  _updateRiskSummary(r);
  var tab=R.tab;
  var clean=stripFence(r.translated||"");
  var views={
    translated:_highlightManualReview(clean)||"",
    risk:_renderRiskTabGrouped(r),
    validation:_renderValidationTab(r.validation||r.semantic_validation||{}),
    diff:_renderDiffTab(r.diff||""),
  };
  if(tab==="trace"){
    var nr=r.node_results||[];
    var html=nr.map(function(n){
      var cls=n.node==="translate"?" style='color:var(--ac);font-weight:700'":"";
      var fallbackClass=r.fallback_used&&n.node==="fallback"?" style='color:var(--am)'":"";
      return"<div"+cls+fallbackClass+"><code>"+n.node.padEnd(16).replace(/ /g,"&nbsp;")+"</code> <span>"+n.status.padEnd(10).replace(/ /g,"&nbsp;")+"</span> <span style='font-variant-numeric:tabular-nums'>"+(n.elapsed_ms||0).toFixed(1).padStart(8)+" ms</span></div>"
    }).join("");
    if(nr.length){html+="<div style='margin-top:8px;font-size:11px;color:var(--t3)'><span style='color:var(--ac)'>\u25cf</span> translate = LLM 调用</div>"}
    E("out").innerHTML=html
  }else if(tab==="risk"){
    E("out").innerHTML=views.risk
  }else{
    E("out").innerHTML="<pre style='margin:0;font:inherit'>"+(views[tab]||"")+"</pre>"
  }
}

// ── Translate ──
async function TL(){
  var c=E("source").value.trim();
  if(!c){return}
  bannerClear();
  E("tbtn").disabled=true;E("tbtn").textContent="翻译中...";
  E("out").innerHTML="";E("cbtn").disabled=true;E("pphase").textContent="";E("bwarn").classList.add("h");
  R.t0=Date.now();R._warned=false;
  var phaseTimer=setInterval(function(){
    var sec=(Date.now()-R.t0)/1000;
    if(sec<2)setPhase(0);else if(sec<3)setPhase(1);else setPhase(2);
    if(sec>30&&!R._warned){R._warned=true;E("bwarn").classList.remove("h")}
    E("bt").textContent=sec.toFixed(0)+"s"
  },200);
  try{
    var pid=PROJS.find(function(x){return x.id===ACTIVE});if(!pid)throw new Error("no active project");
    var body={config_text:c,from_vendor:E("fv").value,to_vendor:E("tv").value};
    var sd=E("sd").value,sp=E("sp").value,td=E("td").value,tp=E("tp").value;
    if(sd&&sd!="auto")body.source_domain=sd;if(sp&&sp!="auto")body.source_platform=sp;
    if(td)body.target_domain=td;if(tp)body.target_platform=tp;
    var r=await fetch("/api/projects/"+pid.id+"/translate",{method:"POST",headers:H(),body:JSON.stringify(body)});
    var d=await r.json();
    if(!r.ok||!d.ok)throw new Error(d.error||"翻译失败");
    var res=d.result;if(!res)throw new Error("接口返回缺少 result");
    R.request_id=d.request_id||"";R.version=d.version||"";R.model=d.model||"";
    R.result=res;R.tab="translated";
    document.querySelectorAll(".tabs button").forEach(function(t){t.classList.toggle("on",t.dataset.tab==="translated")});
    setPhase(4);
    var v=R.result.validation||{};
    var lv=v.level||"info";
    var errs=(v.errors||[]).length;
    var mrr=v.manual_review_required;
    var dep=v.deployable;
    var hasFatal=(lv==="fatal"||errs>0||dep===false);
    var hasReview=(mrr||errs>0);
    E("rtag").textContent=R.result.fallback_used?"规则兜底":"LLM";
    E("rtag").className="tag "+(R.result.fallback_used?"tag--warn":"tag--ok");
    var statusCls=hasFatal?"tag--fail":hasReview?"tag--warn":"tag--ok";
    var statusTxt=hasFatal?"不建议上线":hasReview?"需人工复核":"可部署";
    E("sptag").textContent=statusTxt;
    E("sptag").className="tag "+statusCls;
    E("rm").textContent=E("fv").value+" \u2192 "+E("tv").value;
    E("cbtn").disabled=false;E("ebtn").disabled=false;
    // show request_id row
    if(R.request_id){E("rid").textContent=R.request_id;E("ridr").classList.remove("h");E("rvr").textContent="v"+R.version+(R.model?" \u00b7 "+R.model:"")}
    RN();
    bannerShow(R.result.success?"ok":"warn",R.result.fallback_used?"已使用规则兜底":"翻译成功");
    // Reload project from server so all browsers see the same result
    try{var sr=await fetch("/api/projects/"+pid.id,{headers:H()});if(sr.ok){var sp=await sr.json();if(sp.ok&&sp.project){var refreshed=PROJS.find(function(x){return x.id===ACTIVE});if(refreshed){refreshed.result=sp.project.result;refreshed.request_id=sp.project.request_id||R.request_id;refreshed.version=sp.project.version||R.version;refreshed.model=sp.project.model||R.model;refreshed.config=sp.project.config_text||c;refreshed.tab="translated"}}}}catch(_){}
    renderSidebar()
  }catch(e){
    E("out").innerHTML="<div style='color:var(--rd)'>\u2716 "+e.message.replace(/&/g,"&amp;").replace(/</g,"&lt;")+"</div>";
    bannerShow("fail","翻译失败")
  }finally{
    clearInterval(phaseTimer);
    E("tbtn").disabled=false;E("tbtn").textContent="翻译";
    E("bwarn").classList.add("h");
    E("bt").textContent=R.t0?((Date.now()-R.t0)/1000).toFixed(1)+"s":"-";
    E("pphase").textContent=""
  }
}

function CL(){R.result=null;R.request_id="";R.version="";R.model="";var p=PROJS.find(function(x){return x.id===ACTIVE});if(p){p.result=null;p.request_id="";p.version="";p.model="";saveProject(p)}E("out").innerHTML="";E("cbtn").disabled=true;E("ebtn").disabled=true;E("rtag").textContent="待命";E("rtag").className="tag tag--dim";E("sptag").textContent="-";E("sptag").className="tag tag--dim";E("rm").textContent="";E("bt").textContent="-";E("pphase").textContent="";E("ridr").classList.add("h");bannerClear();_updateRiskSummary(null);renderSidebar()}

// ── Copy dropdown ──
function _toggleCopyMenu(e){e.stopPropagation();var m=E("cpmenu");m.classList.toggle("on")}
function _closeCopyMenu(){E("cpmenu").classList.remove("on")}

async function _copyAll(){_closeCopyMenu();var t=stripFence(R.result?R.result.translated:"");if(!t.trim())return;try{await navigator.clipboard.writeText(t);_flashCopyBtn()}catch(_){}}
async function _copyDeployable(){_closeCopyMenu();var t=stripFence(R.result?R.result.translated:"");var lines=t.split("\n");var filtered=lines.filter(function(l){return l.indexOf("MANUAL_REVIEW")===-1}).filter(function(l){return l.trim()}).join("\n");if(!filtered.trim()){_flashCopyBtn("无可用");return};try{await navigator.clipboard.writeText(filtered);_flashCopyBtn()}catch(_){}}
async function _copyReport(){_closeCopyMenu();var r=R.result;if(!r)return;var v=r.validation||{};var riskSignals=r.risk_signals||[];var lines=["=== 翻译风险报告 ===","","Request ID: "+R.request_id,"Version: "+R.version+(R.model?" ("+R.model+")":""),"","--- 验证 ---","Level: "+(v.level||"info"),"Deployable: "+(v.deployable===false?"否":"是"),"Manual Review: "+(v.manual_review_required?"需复核":"否"),"Errors: "+(v.errors||[]).length,"Warnings: "+(v.warnings||[]).length,"","--- 风险信号 ---"].concat(riskSignals.map(function(s){return"  ["+s.severity+"] "+s.feature+": "+(s.message||"-")})).concat(["","--- 能力缺口 ---"]).concat((r.capability_gaps||[]).map(function(g){return"  ["+g.severity+"] "+g.feature+": "+(g.suggestion||g.status)})).concat(["","--- 分析器发现 ---"]).concat((r.analyzer_results||[]).map(function(a){var rl=a.risk_level||"none";return"  ["+rl+"] "+a.feature+": "+(a.summary||a.notes&&a.notes[0]||"-")})).concat(["","--- 节点耗时 ---"]).concat((r.node_results||[]).map(function(n){return"  "+n.node+": "+(n.elapsed_ms||0).toFixed(1)+"ms "+n.status}));try{await navigator.clipboard.writeText(lines.join("\n"));_flashCopyBtn()}catch(_){}}
function _flashCopyBtn(msg){var b=E("cbtn");b.textContent=msg||"已复制";setTimeout(function(){b.textContent="复制"},1200)}

// ── Export ──
function _buildExportReport(){var r=R.result;if(!r)return null;var v=r.validation||{};return{request_id:R.request_id,version:R.version,model:R.model,source:{vendor:E("fv").value,domain:E("sd").value,platform:E("sp").value},target:{vendor:E("tv").value,domain:E("td").value,platform:E("tp").value},translated:stripFence(r.translated||""),validation:v,risk_signals:r.risk_signals||[],capability_gaps:r.capability_gaps||[],analyzer_results:r.analyzer_results||[],node_results:r.node_results||[],timing:{elapsed_ms:Date.now()-R.t0}}}
async function _exportReport(){var report=_buildExportReport();if(!report)return;var name="translation-report-"+R.request_id+".json";var blob=new Blob([JSON.stringify(report,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}

document.querySelectorAll(".tabs button").forEach(function(t){t.addEventListener("click",function(){R.tab=this.dataset.tab;document.querySelectorAll(".tabs button").forEach(function(b){b.classList.toggle("on",b===t)});RN();saveActive()})});
var _saveTimer=null;
E("source").addEventListener("input",function(){E("cc").textContent=E("source").value.length;clearTimeout(_saveTimer);_saveTimer=setTimeout(saveActive,600)});
E("source").addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();TL()}});
E("tbtn").addEventListener("click",TL);
E("cbtn").addEventListener("click",_toggleCopyMenu);
document.querySelectorAll("#cpmenu .cpi").forEach(function(b){b.addEventListener("click",function(){
  var action=this.dataset.cp;
  if(action==="all")_copyAll();
  else if(action==="deployable")_copyDeployable();
  else if(action==="report")_copyReport()
})});
document.addEventListener("click",_closeCopyMenu);
E("ebtn").addEventListener("click",_exportReport);
E("ridcp").addEventListener("click",function(e){e.stopPropagation();var id=E("rid").textContent;if(!id)return;navigator.clipboard.writeText(id);this.textContent="已复制";setTimeout(function(){E("ridcp").textContent="复制"},1200)});
E("xbtn").addEventListener("click",CL);
E("obtn").addEventListener("click",function(){E("ovl").classList.add("on")});
E("cso").addEventListener("click",function(){E("ovl").classList.remove("on")});
E("ovl").addEventListener("click",function(e){if(e.target===e.currentTarget)E("ovl").classList.remove("on")});
E("svbtn").addEventListener("click",SAVE);
E("tlbtn").addEventListener("click",TST);

Z();L();loadDomainMeta();setInterval(Z,30000);
</script>
